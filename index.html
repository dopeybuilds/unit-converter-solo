<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <title>Metric/Imperial Unit Converter</title>
        <meta charset="UTF-8">
    </head>
    <body id="container">
        <div id="info">
            <h1>Metric/Imperial Unit Converter</h1>
            <input type="number" id="inputNumber">
            <button id="convertButton">Convert</button>
        </div>
        <div id="results">
            <div id="lengthResultContainer">
                <h2>Length (Meters/Feet)</h2>
                <p id="lengthResult"></p>
            </div>
            <div id="volumeResultContainer">
                <h2>Volume (Liters/Gallons)</h2>
                <p id="volumeResult"></p>
            </div>
            <div id="massResultContainer">
                <h2>Mass (Kilograms/Pounds)</h2>
                <p id="massResult"></p>
            </div>
        </div>
    <script src="index.js"></script>
    </body>
</html>
